version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LOG_ROOT_DIR=/logs
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - APPROVED_ELM_BASE_URL=${APPROVED_ELM_BASE_URL}
      - APPROVED_ELM_MODEL=${APPROVED_ELM_MODEL}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-50}
      - SEARCH_ALLOWLIST=${SEARCH_ALLOWLIST:-virtualflybrain.org,*.virtualflybrain.org,flybase.org}
      - OUTBOUND_ALLOWLIST=${OUTBOUND_ALLOWLIST:-virtualflybrain.org,*.virtualflybrain.org,flybase.org,doi.org,pubmed.ncbi.nlm.nih.gov,biorxiv.org,medrxiv.org}
      - REVIEWED_DOCS_INDEX_FILE=${REVIEWED_DOCS_INDEX_FILE:-/app/config/reviewed-docs-index.json}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID}
      - GA_API_SECRET=${GA_API_SECRET}
    volumes:
      - vfb-logs:/logs

volumes:
  vfb-logs:
    driver: local
